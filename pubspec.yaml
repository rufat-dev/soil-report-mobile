name: soilreport
description: "soil report app"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# Version: name is the marketing version (e.g. 2.3.367); number after + is the build number.
# Increment the build number (after +) for each store upload; version name can stay until you bump it.
# Override at build: flutter build ios --build-name=2.3.367 --build-number=368
version: 2.3.370+2.3.370

environment:
  sdk: ^3.8.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  jwt_decoder: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  intl: ^0.20.2
  flutter_layout_grid: 2.0.8
  flutter_rating_bar: 4.0.1
  go_router: 15.0.0
  riverpod: 2.6.1
  flutter_riverpod: 2.6.1
  riverpod_annotation: 2.6.1
  rxdart: 0.28.0
  sembast: ^3.8.3
  sembast_web: ^2.4.0+4
  path_provider: ^2.1.5
  flutter_localization: ^0.3.3
  dio: ^5.8.0+1
  drift: ^2.27.0
  drift_flutter: ^0.2.4
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  local_auth: ^2.3.0
  mask_text_input_formatter: ^2.9.0
  story_view: ^0.16.6
  uuid: ^4.5.1
  path_drawing: ^1.0.1
  skeletonizer: ^2.1.0+1
  cached_network_image: ^3.4.1
  open_file: ^3.5.10
  package_info_plus: ^8.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  camerawesome: ^2.5.0
  flutter_image_compress: ^2.4.0
  json_annotation: ^4.9.0
  geolocator: ^13.0.1
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  device_info_plus: ^11.3.1
  connectivity_plus: ^7.0.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: 5.0.0
  mocktail: 1.0.4
  build_runner: ^2.5.4
  riverpod_generator: 2.6.5
  custom_lint: 0.7.5
  riverpod_lint: 2.6.5
  json_serializable: ^6.9.5
  drift_dev: ^2.27.0


flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  fonts:
    # Used for Golden Image tests
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
          weight: 500
        - asset: assets/fonts/OpenSans-Semibold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Semibold.ttf
          weight: 600

  assets:
    # Add all product images
    - assets/images/static/

flutter_native_splash:
  android: true
  ios: true
  color: "#457c3b"
  image: assets/icon/app-icon.jpeg
  ios_content_mode: center
  android_12:
    color: "#457c3b"
    image: assets/icon/app-icon.jpeg
    icon_background_color: "#457c3b"